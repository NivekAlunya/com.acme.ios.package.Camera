name: AI PR Reviewer
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
permissions:
  contents: read
  pull-requests: write
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: coderabbitai/ai-pr-reviewer@latest # Fixed: was coderabbit-ai (with hyphen)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        with:
          openai_base_url: "https://api.mistral.ai/v1"
          openai_light_model: "mistral-tiny-latest"
          openai_heavy_model: "mistral-large-latest"
          system_message: |
            You are an AI code reviewer. Analyze the changes, suggest improvements, and ensure best practices.
          exclude_files: "*.md,*.txt"
