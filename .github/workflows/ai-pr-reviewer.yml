name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.sender.type != 'Bot'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "Diff size: $(wc -l < pr_diff.txt) lines"

      - name: Review with Mistral
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          DIFF=$(cat pr_diff.txt | head -c 15000)  # limit to ~15k chars

          PAYLOAD=$(jq -n \
            --arg diff "$DIFF" \
            '{
              model: "mistral-large-latest",
              messages: [
                {
                  role: "system",
                  content: "You are an expert code reviewer. Review the following git diff and provide:\n1. A brief summary of the changes\n2. Potential issues or bugs\n3. Suggestions for improvement\n4. Overall assessment\n\nBe concise and actionable. Use markdown formatting."
                },
                {
                  role: "user",
                  content: ("Please review this pull request diff:\n\n```diff\n" + $diff + "\n```")
                }
              ]
            }')

          RESPONSE=$(curl -s -X POST https://api.mistral.ai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $MISTRAL_API_KEY" \
            -d "$PAYLOAD")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Error: no response from Mistral"')

          COMMENT=$(jq -n --arg body "## 🤖 AI Code Review\n\n$REVIEW" '{body: $body}')

          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments \
            -d "$COMMENT"
